# Kuratierte US-Indikatoren — Werte die sich selten ändern oder keine freie API haben.
# Manuell pflegen (Git-Commit). Der `curated`-Provider liest dies und schreibt in data_points.
#
# Format pro Eintrag:
#   <indicator-slug>:
#     value:     Zahl
#     date:      YYYY-MM-DD (Stichtag, typischerweise letztes Steuerjahr/Berichtsjahr)
#     unit:      Einheit (für Anzeige; auch in indicators.unit gepflegt)
#     note:      1–2 Sätze Quelle / Kommentar
#     source_url: Optional Link zur Primärquelle
#
# Änderungen:
# - Neuen Wert? Einfach den Block ersetzen und einen neuen Datapoint mit neuerem date-Feld anlegen
#   (als zusätzlichen Eintrag unter gleichem Slug, siehe "corporate-tax-rate-history").
#   Der Provider schreibt alle Einträge (indicator, country, date) als eigene Rows.

country: US

# --- Taxes (Trading Economics "Taxes" Tab) ---

corporate-tax-rate:
  value: 21
  date: "2026-12-31"
  unit: "%"
  note: "Bundes-Körperschaftsteuer seit TCJA 2017."
  source_url: "https://www.irs.gov/corporations"

personal-income-tax-rate:
  value: 37
  date: "2026-12-31"
  unit: "%"
  note: "Top-Federal-Bracket. TCJA-Sätze gelten bis 2026 Jahresende, danach Anpassung möglich."
  source_url: "https://www.irs.gov/taxtopics/tc409"

sales-tax-rate:
  value: 0
  date: "2026-12-31"
  unit: "%"
  note: "USA hat keine bundesweite Sales Tax (Staaten erheben lokal 0–7.25%)."

