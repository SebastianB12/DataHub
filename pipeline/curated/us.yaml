social-security-rate-companies:
  value: 7.65
  date: "2026-12-31"
  unit: "%"
  note: "Arbeitgeber-Anteil: 6.2% Social Security + 1.45% Medicare."

social-security-rate-employees:
  value: 7.65
  date: "2026-12-31"
  unit: "%"
  note: "Arbeitnehmer-Anteil: 6.2% Social Security + 1.45% Medicare."

withholding-tax-rate:
  value: 30
  date: "2025-12-31"
  unit: "%"
  note: "Standard-Quellensteuer für Non-Resident Income. Bei DBA reduziert."

