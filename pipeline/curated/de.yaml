# Kuratierte DE-Indikatoren — Werte gegen Trading Economics geprüft 2026-05-01.
# Pflegen = YAML editieren, dann `python -m pipeline.providers.curated`.

country: DE

# --- Taxes (TE "Taxes" Tab, alle Stand Dec/26) ---

corporate-tax-rate:
  value: 30
  date: "2026-12-31"
  unit: "%"
  note: "Körperschaftsteuer 15% + Solidaritätszuschlag 5.5% darauf + Gewerbesteuer (Hebesatz-abhängig). TE: 30%."
  source_url: "https://tradingeconomics.com/germany/corporate-tax-rate"

personal-income-tax-rate:
  value: 45
  date: "2026-12-31"
  unit: "%"
  note: "Reichensteuersatz 45% (ab ~278k zu versteuerndem Einkommen). Spitzensteuersatz darunter ist 42%."
  source_url: "https://tradingeconomics.com/germany/personal-income-tax-rate"

sales-tax-rate:
  value: 19
  date: "2026-12-31"
  unit: "%"
  note: "Umsatzsteuer / Mehrwertsteuer (Regelsatz). Ermäßigter Satz 7% nicht hier abgebildet."
  source_url: "https://tradingeconomics.com/germany/sales-tax-rate"

social-security-rate:
  value: 38.74
  date: "2026-12-31"
  unit: "%"
  note: "Gesamt (AG + AN). RV + KV + PV + AV summiert. TE-konform."
  source_url: "https://tradingeconomics.com/germany/social-security-rate"

social-security-rate-companies:
  value: 19.42
  date: "2026-12-31"
  unit: "%"
  note: "Arbeitgeberanteil."
  source_url: "https://tradingeconomics.com/germany/social-security-rate-for-companies"

social-security-rate-employees:
  value: 19.33
  date: "2026-12-31"
  unit: "%"
  note: "Arbeitnehmeranteil."
  source_url: "https://tradingeconomics.com/germany/social-security-rate-for-employees"

withholding-tax-rate:
  value: 0
  date: "2025-12-31"
  unit: "%"
  note: "Innerhalb EU keine Quellensteuer; bilateral oft reduziert. TE: 0%."
  source_url: "https://tradingeconomics.com/germany/withholding-tax-rate"

# --- Government: Statische Ranking-/Rating-Indikatoren ---

