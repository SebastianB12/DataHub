productivity:
  old_series: "eurostat:namq_10_lp_ulc:RLPR_HW:I20"
  new_series: "eurostat:namq_10_lp_ulc:RLPR_HW:I20"
  te_value: 95.60
  te_source: "Bundesbank monthly"
  our_value: 100.28
  status: "deferred: Bundesbank BBDE1 monthly productivity series discovery requires SDMX codelist endpoint which returns 404"
  notes: |
    DSD BBK_DOES has 9 dimensions (FREQ, AREA, ADJUSTMENT, CONCEPT, CLASSIFICATION,
    PROCESSING, PRICEUNIT, BASIS, SUFFIX). Metadata/codelist endpoint returns 404 for
    BBK_DOES_CONCEPT — cannot enumerate productivity concept codes. DBnomics BUBA
    full-text search returned no hits. Test SDMX keys (M.DE.N.W..A.H.B etc.) all 404.
    Bundesbank Webportal (statistiken.bundesbank.de) is SPA — no machine-readable
    search. Kept on Eurostat namq_10_lp_ulc until Bundesbank discovery completes.
    Truth.yaml entry still says eurostat (currently matches DB).

