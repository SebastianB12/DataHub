# Trading Economics Indikatoren, die wir nicht haben — zentraler Katalog
# ---------------------------------------------------------------------
# Format pro Eintrag:
#   country:            ISO-2 Ländercode (US, DE, GB, EA, ...)
#   indicator_name:     Originalname wie bei Trading Economics
#   te_category:        Tab in dem TE ihn listet (Overview / GDP / Labour / Prices / Money / Trade / Government / Business / Consumer / Housing / Energy / Health / Taxes)
#   reason:             licensed / no-free-source / deprecated / annual-survey / market-data / other
#   source:             ursprüngliche Quelle (ISM, MBA, Reuters, ...)
#   note:               1–2 Sätze warum die Reihe nicht kostenfrei oder zuverlässig zu kriegen ist
#   possible_workaround:  Optional — Proxy-Reihe oder spätere Alternative
#
# Pflegehinweise:
# - Neue Länder: unten anhängen, gleiche Struktur.
# - "licensed" = kostenpflichtig. "no-free-source" = keine frei verfügbare Alternative gefunden.
# - "market-data" = Stock Market, Currency-Indizes — bewusst aus dem Scope.
# - Bei Re-Scan eines Landes: duplikate Einträge löschen, neue hinzufügen.

gaps:

