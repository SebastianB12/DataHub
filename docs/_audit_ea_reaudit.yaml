    - changes-in-inventories   # TE 26.52 not reproducible from any Eurostat vintage
    - government-spending-eur  # no TE page; sibling indicator
    - job-vacancies            # no TE page; Eurostat aggregate JOBVAC empty
    - retail-sales             # TE redirects to retail-sales-yoy; YoY-vs-level handling ok
  prior_fixes_carried_over:
    - consumer-spending        # CP_MEUR -> CLV20_MEUR
    - current-account          # Eurostat quarterly -> ECB monthly
    - current-account-to-gdp   # bop_eu6_q -> tipsbp20 annual
    - gdp-per-capita           # .CD -> .KD constant USD
    - gdp-per-capita-ppp       # .PP.CD -> .PP.KD constant intl$
    - government-spending      # annual -> quarterly chain-linked
    - gross-fixed-capital-formation  # nominal -> chain-linked 2015
    - industrial-production    # SCA -> CA
    - population               # geo_override EA20 to avoid EA21 inflation
