core-cpi:
  desc: 'The annual core inflation rate in the United States, which excludes food and energy, rose to 2.8% in April of 2026 from 2.6% in the previous month, slightly above market expectations of 2.7%. It
    was the sharpest core inflation rate since September of last year. Prices rose sharply for services less energy services (3.3%) amid higher costs for shelter (3.3%) and transportation services (4.3%).
    IN turn, prices rose sharply for apparel (4.2%), while they fell rose less for new vehicles (0.2%) and tumbled for used cars and trucks (-2.7%). From the previous month, core consumer prices rose by
    0.4%, the sharpest increase since January 2025. source: U.S. Bureau of Labor Statistics'
  http: 200
  label: U.S. Bureau of Labor Statistics
core-producer-prices:
  desc: 'Core Producer Prices in the United States increased to 154.06 points in April from 152.48 points in March of 2026. Core Producer Prices in the United States averaged 119.48 points from 2010 until
    2026, reaching an all time high of 154.06 points in April of 2026 and a record low of 99.90 points in April of 2010. source: U.S. Department of Labor'
  http: 200
  label: U.S. Department of Labor
corporate-profits:
  desc: 'Corporate profits in the United States rose by 5.7% from the previous period in the fourth quarter of 2025, the most in one year, picking up from the 4.7% increase in the third quarter. Corporate
    Profits in the United States averaged 681.95 USD Billion from 1947 until 2025, reaching an all time high of 3605.67 USD Billion in the fourth quarter of 2025 and a record low of 9.96 USD Billion in
