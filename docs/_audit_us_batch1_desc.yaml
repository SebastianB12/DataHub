chicago-fed-national-activity-index:
  desc: 'The Chicago Fed National Activity Index (CFNAI) dropped to -0.20 in March 2026, its lowest level since November 2025, down from a revised +0.03 in February. Three of the four key categories declined,
    with production-related indicators contributing -0.20 (down from +0.13 in February), sales, orders, and inventories subtracting -0.01 (from +0.05), and personal consumption and housing also at -0.01
    (from neutral). Only employment-related indicators improved, adding +0.02 compared to -0.15 in February. source: Federal Reserve Bank of Chicago'
  http: 200
  label: Federal Reserve Bank of Chicago
construction-payrolls:
  desc: 'Construction Payrolls in the United States decreased to 9 Thousand in April from 16 Thousand in March of 2026. Construction Payrolls in the United States averaged 6.86 Thousand from 1939 until
