currency:
  desc: The dollar index rose to approach 99.3 on Friday, the strongest level in about a month, as concerns over war-driven inflation intensified. The situation in the Middle East remains fragile and far
    from resolved, with Trump describing the first sentence of Iran’s latest proposal as “unacceptable”. As a result, oil prices continued to climb, with the Strait of Hormuz still closed. Meanwhile, a
    summit between President Trump and Chinese President Xi ended without any major agreements, including any indication that Beijing would help resolve the conflict. Both the CPI and PPI reports released
    this week suggested that the energy shock is pushing US inflation higher. Traders are now fully pricing in one rate hike by the Fed in March next year, with more than a 50% chance that interest rates
    will rise before the end of 2026. The greenback strengthened across the board and the biggest gains were seen against the Aussie ad the pound.On the week, the dollar is up nearly 1%.
  http: 200
  label: null
current-account:
  desc: 'The United States current account deficit narrowed to a seasonally adjusted $190.7 billion in the fourth quarter of 2025 from $239.1 billion in the previous period, marking the lowest deficit since
    the first quarter of 2021. The goods deficit narrowed to $241.5 billion from $265.9 billion, as imports contracted more than exports, reflecting the impact of tariffs from the US presidential administration.
    Additionally, the primary income balance swung to a surplus of $23.9 billion from the deficit of $2.5 billion. In the meantime, the services surplus inched lower to $81.4 billion from $86.5 billion
    and the secondary income deficit inched down to $54.6 billion from $57.2 billion. The gap reflected a current account deficit of 2.4% of the US GDP in the fourth quarter, narrowing from 3.1% in the
    third quarter. source: U.S. Bureau of Economic Analysis'
  http: 200
  label: U.S. Bureau of Economic Analysis
cushing-crude-oil-stocks:
  desc: 'Crude stocks at the Cushing, Oklahoma, delivery hub decreased by 1.702 million barrels in the week ended May 8, 2026. Cushing Crude Oil Stocks in the United States averaged 13.67 Thousand Barrels
    from 2004 until 2026, reaching an all time high of 6417.00 Thousand Barrels in April of 2020 and a record low of -5587.00 Thousand Barrels in May of 2020. source: U.S. Energy Information Administration'
  http: 200
  label: U.S. Energy Information Administration
dallas-fed-manufacturing-index:
  desc: 'The Dallas FED''s general business activity index for Texas manufacturing fell to -2.3 in April 2026 from -0.2 in March, marking its lowest level so far this year. The company outlook index rebounded
    into positive territory at 3, while the outlook uncertainty index declined to 17.9 after nearing a one-year high in March. Labor market indicators were largely stable. Employment remained flat, but
    firms reported slightly longer workweeks, with the hours worked index rising to 4 from 0.9. Wage pressures showed little movement, as both the wages and benefits index were unchanged. Price pressures
    intensified, the finished goods price index surged to 27.6, its highest level since July 2022, while the raw materials price index climbed 4.3 points to 37. Looking ahead, expectations of general business
    activity rose 4 points to 14.1, as firms expect an increase in manufacturing activity over the next six months. source: Federal Reserve Bank of Dallas'
  http: 200
  label: Federal Reserve Bank of Dallas
