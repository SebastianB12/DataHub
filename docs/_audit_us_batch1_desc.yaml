employed-persons:
  desc: 'The number of employed persons in The United States decreased to 162622 Thousand in April of 2026 from 162848 Thousand in March of 2026. Employed Persons in the United States averaged 108558.75
    Thousand from 1948 until 2026, reaching an all time high of 163992.00 Thousand in December of 2025 and a record low of 57172.00 Thousand in June of 1949. source: U.S. Bureau of Labor Statistics'
  http: 200
  label: null
employment-cost-index:
  desc: 'Compensation costs for civilian workers in the United States rose by 0.9% in the first quarter of 2026, after a 0.7% increase in the previous period, slightly above forecasts of a 0.8% rise. Wages
    and salaries increased 0.8% (vs 0.7% in Q4 2025) and benefits rose at a faster pace of 1.2% (vs 0.8%), the highest level in five months. Compensation costs for private industry workers grew 0.9%, from
    0.7% in Q4 2025, and for state and local government workers grew 1%, from 0.8% in the previous quarter. On an annual basis, employment cost growth remained unchanged from the last period at 3.4%. source:
    U.S. Bureau of Labor Statistics'
  http: 200
  label: U.S. Bureau of Labor Statistics
employment-cost-index-benefits:
  desc: 'Benefits in the US rose by 1.2% in Q1 2026, accelerating from a 0.8% increase in the previous period and reaching its highest level in five months. Private industry benefits grew by 1.3%, while
    state and local government''s benefits increased by 1.2%. On an annual basis, benefits rose by 3.6% broadly, while health benefits'' growth eased to 5.7% (vs 6.4%). source: U.S. Bureau of Labor Statistics'
  http: 200
  label: U.S. Bureau of Labor Statistics
employment-cost-index-wages:
  desc: 'Wages and salaries in the US rose 0.8% quarter-on-quarter in Q1 2026, accelerating from a 0.7% increase in the previous period. Private industry pay remained unchanged while state and local governments
    wage growth increase by 1%, from 0.8%. On an annual basis, wages increased 3.4% broadly, picking up from a 3.3% in the last quarter. source: U.S. Bureau of Labor Statistics'
  http: 200
  label: U.S. Bureau of Labor Statistics
employment-rate:
  desc: 'Employment Rate in the United States decreased to 59.10 percent in April from 59.20 percent in March of 2026. Employment Rate in the United States averaged 59.26 percent from 1948 until 2026, reaching
    an all time high of 64.70 percent in April of 2000 and a record low of 51.20 percent in April of 2020. source: U.S. Bureau of Labor Statistics'
  http: 200
  label: null
energy-inflation:
  desc: 'US energy inflation soared to 17.9% year-over-year in April 2026, up from 12.5% in March and marking the steepest annual increase since September 2022. The surge was driven by the Iran war and
    the closure of the Strait of Hormuz. Energy commodities spiked 29.2%, with gasoline prices up 28.4% and fuel oil rising 54.3%. Energy services also climbed 5.4%, led by a 6.1% increase in electricity
    costs and a 3.0% rise in piped gas service. On a monthly basis, energy prices jumped 3.8% in April, following a 10.9% surge in March. source: Bureau of Labor Statistics'
  http: 200
  label: null
existing-home-sales:
  desc: 'Existing home sales in the United States inched higher by 0.2% from the seven-month low in the previous month to an annualized rate of 4.02 million units in April of 2026. The result was slightly
    below expectations 4.05 million units sold, pressured by higher mortgage rates after the surge in energy prices drove long-term Treasury yields to increase. Sales fell sharply in the West (-2.6% to
    750 thousand), offsetting an increase in the Midwest (2.2% to 950 thousand). Inventory grew by 5.8% to 1.47 million, equivalent to 4.4 months of supply. Still, the NAR saw the result as optimistic.
    “Despite mixed macroeconomic signals—including a record-high stock market and historically low consumer confidence—home sales were modestly boosted by the continued improvement in housing affordability,”
    said NAR Chief Economist Dr. Lawrence Yun. “Mortgage rates are lower from a year ago, and average income growth is outpacing home price gains.”. source: National Association of Realtors'
  http: 200
  label: National Association of Realtors
exports:
  desc: 'US exports rose 2.0%, or $6.2 billion, to a record $320.9 billion in March 2026, fueled by a $6.5 billion surge in goods exports. Industrial supplies and materials led the gain, up $5.0 billion,
    driven by higher energy prices tied to the Iran conflict. Key contributors included crude oil (+$2.8 billion), other petroleum products (+$1.7 billion), and fuel oil (+$1.6 billion), while exports of
    other precious metals fell $1.6 billion. Food, feed, and beverage exports increased $1.1 billion, boosted by soybeans, while consumer goods exports declined $1.7 billion. Services exports dipped $0.3
    billion, with travel down $1.1 billion, partially offset by gains in transport (+$0.2 billion), financial services (+$0.1 billion), and other business services (+$0.1 billion). source: U.S. Census Bureau'
  http: 200
  label: U.S. Census Bureau
factory-orders:
  desc: 'US factory orders rose 1.5% month-over-month to $630.4 billion in March 2026, beating market expectations of 0.5% and following an upwardly revised 0.3% increase in February. New orders for manufactured
    durable goods increased 0.8% to $318.9 billion, ending three straight months of declines. Computers and electronic products surged 3.6%, the most since March 2001, with electromedical, measuring, and
    control instruments up 7.9% to a record high amid an AI investment boom and data center construction. Transport equipment orders also rose 0.8%, led by vehicles (0.9%), defense aircraft and parts (17.8%),
    and ships and boats (30.9%). Gains were also seen in machinery (0.9%), electrical equipment, appliances, and components (0.8%), and primary metals (0.5%). Nondurable goods orders rose 2.1% to $311.5
    billion, the highest level since October 2022. Excluding transportation, factory orders grew 1.6% in March, while excluding defense, orders rose 0.9%. source: U.S. Census Bureau'
  http: 200
  label: U.S. Census Bureau
