  http: 200
  label: U.S. Bureau of Labor Statistics
construction-spending:
  desc: 'Construction spending in the US rose by 0.6% month-over-month in March 2026, following a 0.2% fall in the prior month and better than the expected 0.2% increase. This marked the first increase
    since December last year. Private construction increased by 0.8%, buoyed by a 1.7% gain in the residential segment, primarily new single-family projects (+2.7%) and, to a lesser extent, multi-family
    projects (+0.3%). Conversely, spending on nonresidential structures shrank by 0.2%, primarily manufacturing (-1.2%), commercial (-0.6%) and lodging (-0.5%). Meanwhile, public construction spending fell
    0.2%, led by declines in both residential (-2.7%) and nonresidential (-0.2%) segments. Year-on-year, construction spending grew by 1.6%. source: U.S. Census Bureau'
  http: 200
  label: U.S. Census Bureau
consumer-confidence:
  desc: 'The University of Michigan’s Consumer Sentiment Index dropped to a record low of 48.2 in early May 2026, missing market expectations of 49.5 and falling below April’s 49.8. The current conditions
    component declined about 9% to 47.8, driven by growing concerns over high prices affecting personal finances and buying conditions for major purchases. Meanwhile, the expectations index edged up to
    48.5, though real income expectations continued their decline from March. About one-third of consumers spontaneously cited gasoline prices, and roughly 30% mentioned tariffs, underscoring that consumers
    still feel pressured by rising costs, particularly at the pump. Year-ahead inflation expectations eased slightly to 4.5% from 4.7%, while long-run inflation expectations dipped to 3.4% from 3.5%. source:
    University of Michigan'
  http: 200
  label: University of Michigan
consumer-credit:
  desc: 'Total US consumer credit increased by $24.9 billion in March 2026, following a downwardly revised $8.85 billion rise in the previous month and well above forecasts of a $12.5 billion increase.
    Revolving credit, which includes credit card debt, rose to $1.34 trillion from $1.33 trillion in February. Meanwhile, nonrevolving credit, including auto and student loans, increased to $3.80 trillion
    from $3.79 trillion in the prior month. source: Federal Reserve'
  http: 200
  label: Federal Reserve
consumer-spending:
  desc: 'Consumer Spending in the United States increased to 16731.20 USD Billion in the first quarter of 2026 from 16665.20 USD Billion in the fourth quarter of 2025. Consumer Spending in the United States
    averaged 6788.76 USD Billion from 1947 until 2026, reaching an all time high of 16731.20 USD Billion in the first quarter of 2026 and a record low of 1351.40 USD Billion in the first quarter of 1947.
    source: U.S. Bureau of Economic Analysis'
  http: 200
  label: null
continuing-jobless-claims:
  desc: 'Continuing Jobless Claims in the United States increased to 1782 thousand in the week ending May 2 of 2026 from 1758 thousand in the previous week. Continuing Jobless Claims in the United States
    averaged 2729.19 Thousand from 1967 until 2026, reaching an all time high of 23130.00 Thousand in May of 2020 and a record low of 988.00 Thousand in May of 1969. source: U.S. Department of Labor'
