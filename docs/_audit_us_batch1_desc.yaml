adp-employment-change:
  desc: 'Private businesses in the US added a net 109,000 jobs in April 2026, the largest increase since January 2025 and above market forecasts of 99,000. The stronger-than-expected data still reflects
    the Fed’s described "low-hire, low-fire" labor market, where employers avoid layoffs but have significantly reduced hiring amid slower labor force growth due to lower immigration. The service-providing
    sector led gains with 94,000 jobs, driven by education and health services (+61,000), trade, transportation and utilities (+25,000), and financial activities (+9,000). The goods-producing sector contributed
    15,000 jobs, mainly from construction (+10,000). Small businesses were the top contributors, adding 65,000 jobs, followed by large companies (+42,000), while medium-sized firms added 2,000. source:
    Automatic Data Processing, Inc.'
  http: 200
  label: Automatic Data Processing, Inc.
average-weekly-hours:
  desc: 'The average workweek for all employees on private nonfarm payrolls edged up by 0.1 hour to 34.3 hours in April 2026, slightly above market estimates of 34.2 hours. In manufacturing, the average
    workweek edged up by 0.1 hour to 40.4 hours, and overtime was unchanged at 3.0 hours. The average workweek for production and nonsupervisory employees on private nonfarm payrolls remained at 33.8 hours
    source: U.S. Bureau of Labor Statistics'
  http: 200
  label: U.S. Bureau of Labor Statistics
budget-deficit:
  desc: 'The United States recorded a Government Budget deficit equal to 5.90 percent of the country''s Gross Domestic Product in 2025. Government Budget in the United States averaged -2.66 percent of GDP
    from 1948 until 2025, reaching an all time high of 4.50 percent of GDP in 1948 and a record low of -14.50 percent of GDP in 2020. source: U.S. Treasury'
  http: 200
  label: U.S. Treasury
building-permits:
  desc: 'US building permits fell 11.4% month-over-month to a seasonally adjusted annualized rate of 1.363 million in March 2026, below the preliminary estimate of 1.372 million, revised figures showed.
    The reading marked the lowest level since August 2025. In February, building permits rose 11%. Permits for buildings with five or more units dropped by 24.9% to an annualized rate of 419 thousand, while
    single-family permits decreased by 3.8% to 895 Thousand. Regionally, permits declined in the Northeast (-30.2% to 113 thousand), the Midwest (-3.2% to 212 thousand), in the South (-8% to 715 thousand),
    and in the West (-15% to 323 thousand). source: U.S. Census Bureau'
  http: 200
  label: U.S. Census Bureau
business-inventories:
  desc: 'US business inventories rose by 0.9% month-over-month in March 2026, following a 0.4% increase in February and slightly above market expectations of a 0.8% advance. This marked the strongest increase
    in stocks since June 2022, mainly on account of merchant wholesalers (1.3% vs 0.9% in February). Inventories also went up for manufacturers (0.6% vs 0.1%) and retailers (0.6 vs 0%). On a yearly basis,
    business inventories grew by 2% in March. source: U.S. Census Bureau'
  http: 200
  label: U.S. Census Bureau
capital-flows:
  desc: 'Net foreign acquisitions of long-term securities, short-term U.S. securities, and banking flows resulted in a net TIC inflow of $184.5 billion in February 2026. Of this total, $166.5 billion was
    attributable to private foreign investors, while foreign official institutions accounted for $18.0 billion. Foreign residents increased their holdings of long-term U.S. securities, with net purchases
    of $101.1 billion. This included $147.3 billion in purchases by private investors, partly offset by net sales of $46.1 billion by foreign official institutions. At the same time, U.S. investors expanded
    their holdings of long-term foreign securities, recording net purchases of $42.6 billion. In short-term instruments, foreign residents increased their holdings of U.S. Treasury bills by $91.6 billion.
    Additionally, their holdings of all dollar-denominated short-term U.S. securities and other custody liabilities rose by $87.4 billion. source: U.S. Department of the Treasury'
  http: 200
  label: U.S. Department of the Treasury
