durable-goods-orders:
  desc: 'New orders for US-manufactured durable goods rose by 0.8% from the previous month to $318.9 billion in March of 2026, rebounding from the revised 1.2% drop in the previous month, and slightly ahead
    of market expectations of a 0.5% increase. The result reflected some traction to goods orders despite the jump injection of uncertainty in the period as the war with Iran triggered a surge in energy
    prices and disrupted global shipping. Orders rose sharply for computers and electronic products (3.7% to $29.6 billion), aligned with the stronger momentum for AI products. Orders were also higher for
    machinery (0.8% to $41.8 billion), primary metals (0.4% to 28.8 billion), electrical equipment (0.8% to $18.3 billion), and the commonly volatile transportation equipment space (0.8% to $106.7 billion).
    source: U.S. Census Bureau'
  http: 200
  label: U.S. Census Bureau
durable-goods-orders-ex-defense:
  desc: 'New orders for manufactured durable goods, excluding defense, in the US decreased 0.3% in March 2026. Durable Goods Orders Ex Defense in the United States averaged 0.34 percent from 1992 until
    2026, reaching an all time high of 29.30 percent in July of 2014 and a record low of -22.20 percent in August of 2014. source: U.S. Census Bureau'
  http: 200
  label: U.S. Census Bureau
