  fix_summary: null
  flag: needs-attention
  notes: >
    Source (BoE) matches TE. But series is LPMBL22 = BoE Total Balance Sheet
    monthly (~644 GBP bn) while TE uses a weekly aggregate (~774 GBP bn).
    Different scope/aggregation. Also: indicator_sources.series_id row says
    `boe:rpwb55a` while the actual provider code uses LPMBL22 — stale note,
    needs correction. RPWB55A returns only ~97k GBP m (a sub-component).
    Needs research into which BoE weekly series TE uses (likely the "Bank
    Return" total assets including APF), and whether to switch.

