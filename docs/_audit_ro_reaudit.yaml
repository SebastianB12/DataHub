# RO re-audit 2026-05-17 — fresh TE fetches vs DB
# Methodology: curl https://tradingeconomics.com/romania/<slug> with UA spoof,
# parse source-name <a> tag OR source-present span. Compare to indicator_sources
# default + latest data_points. Honest-label rule applied (source = fetch
# technology, never relabeled upstream).
#
# Cache:  docs/_audit_te_html/RO/<slug>.html  (68 files)
# Parsed: docs/_audit_ro_te_parsed.json
#
# Validator status before+after: GREEN.

summary:
  total_slugs: 68
  source_changes_applied: 2     # inflation-cpi data-config; minimum-wages curated->eurostat
  truth_yaml_blocks_rewritten: 68
  deferred_gaps: 12             # primary-source extensions documented (MFP, ANOFM, INSSE-NA, BNR)
  unknown_te_pages: 14          # TE returns generic homepage for these slugs

real_fixes:
  inflation-cpi:
    before: { source: insse_ro, matrix: IPC102A, unit: MoM-index (prev month=100) }
    after:  { source: insse_ro, matrix: IPC102E, unit: YoY-index (same month prev year=100) }
    rationale: |
      TE displays the YoY rate (e.g. April 2026 = 9.5%) as the headline.
      IPC102A returned MoM ~100 (off by ~960% vs TE).  IPC102E publishes
      the YoY 100-base index so 109.5 reads as +9.5% YoY.  Code change:
      added row_filter arg in fetch_ro_tempo + exact TOTAL filter (the
      dim pin alone matched 'TOTAL MARFURI ALIMENTARE' etc.).
    db_action: 302 data_points wiped+repopulated, indicator_sources note refreshed.

  minimum-wages:
    before: { source: curated, value: 4050 RON/Month, date: 2026-01-31 }
    after:  { source: eurostat, dataset: earn_mw_cur, value: 795 EUR/Month, date: 2026-01-01 }
    rationale: |
      TE labels source as EUROSTAT directly and displays 795 EUR for 2026-S1.
      Curated static row was stale at 4050 RON/Month.  Switched to Eurostat
      bi-annual minimum-wage series for live updates.  Removed entry from
      pipeline/curated/ro.yaml; migration 078_ro_reaudit updates the DB row.
    db_action: 55 EUR data_points loaded, curated static entry removed.

